info.app:
  name: HMPPS Court Cases Release Dates Api
  version: 1.0

spring:
  application:
    name: hmpps-court-cases-release-dates-api
  codec:
    max-in-memory-size: 10MB

  jackson:
    date-format: "yyyy-MM-dd HH:mm:ss"

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${hmpps-auth.url}/.well-known/jwks.json

      client:
        provider:
          hmpps-auth:
            token-uri: ${hmpps-auth.url}/oauth/token
        registration:
          calculate-release-dates-api:
            provider: hmpps-auth
            client-id: ${system.client.id}
            client-secret: ${system.client.secret}
            authorization-grant-type: client_credentials
            scope: read,write
          adjustments-api:
            provider: hmpps-auth
            client-id: ${system.client.id}
            client-secret: ${system.client.secret}
            authorization-grant-type: client_credentials
            scope: read,write
          identify-remand-api:
            provider: hmpps-auth
            client-id: ${system.client.id}
            client-secret: ${system.client.secret}
            authorization-grant-type: client_credentials
            scope: read,write
          court-data-ingestion-api:
            provider: hmpps-auth
            client-id: ${system.client.id}
            client-secret: ${system.client.secret}
            authorization-grant-type: client_credentials
            scope: read,write
  web:
    error:
      include-message: always

server:
  port: 8080
  servlet:
    context-path: /
  forward-headers-strategy: native
  tomcat:
    remoteip:
      remote-ip-header: x-forwarded-for
      protocol-header: x-forwarded-proto
      internal-proxies: 10\.\d{1,3}\.\d{1,3}\.\d{1,3}|192\.168\.\d{1,3}\.\d{1,3}|169\.254\.\d{1,3}\.\d{1,3}|127\.\d{1,3}\.\d{1,3}\.\d{1,3}|172\.1[6-9]{1}\.\d{1,3}\.\d{1,3}|172\.2[0-9]{1}\.\d{1,3}\.\d{1,3}|172\.3[0-1]{1}\.\d{1,3}\.\d{1,3}|0:0:0:0:0:0:0:1|::1|100\.6[4-9]\.\d{1,3}\.\d{1,3}|100\.[7-9][0-9]{1}\.\d{1,3}\.\d{1,3}|100\.1[0-1][0-9]{1}\.\d{1,3}\.\d{1,3}|100\.12[0-7]\.\d{1,3}\.\d{1,3}
  shutdown: graceful

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: 'info, health'
  endpoint:
    health:
      cache:
        time-to-live: 2000ms
      show-components: always
      show-details: always
      probes:
        enabled: true
    info:
      cache:
        time-to-live: 2000ms

ccrd-service-configurations:
  services:
    overview:
      text: 'Overview'
      ui-url: ${hmpps-court-cases-and-release-dates-ui-url}
      url-mapping: '/prisoner/{prisonerId}/overview'
      requiredRoles:
        - 'RELEASE_DATES_CALCULATOR'
      maintenanceAlert:
        enabled: ${maintenance-alert-overview-feature-toggle:false}
        message: ${maintenance-alert-overview-message:placeholder}
    courtCases:
      text: 'Court cases'
      ui-url: ${hmpps-remand-and-sentencing-ui-url}
      url-mapping: '/person/{prisonerId}'
      requiredRoles:
        - 'REMAND_AND_SENTENCING'
      maintenanceAlert:
        enabled: ${maintenance-alert-court-cases-feature-toggle:false}
        message: ${maintenance-alert-court-cases-message:placeholder}
    adjustments:
      text: 'Adjustments'
      ui-url: ${hmpps-adjustments-ui-url}
      url-mapping: '/{prisonerId}'
      requiredRoles:
        - 'RELEASE_DATES_CALCULATOR'
      maintenanceAlert:
        enabled: ${maintenance-alert-adjustments-feature-toggle:false}
        message: ${maintenance-alert-adjustments-message:placeholder}
    recalls:
      text: 'Recalls'
      ui-url: ${hmpps-recalls-ui-url}
      url-mapping: '/person/{prisonerId}'
      requiredRoles:
        - 'RECALL_MAINTAINER'
      maintenanceAlert:
        enabled: ${maintenance-alert-recalls-feature-toggle:false}
        message: ${maintenance-alert-recalls-message:placeholder}
    releaseDates:
      text: 'Release dates and calculations'
      ui-url: ${hmpps-calculate-release-dates-ui-url}
      url-mapping: '?prisonId={prisonerId}'
      requiredRoles:
        - 'RELEASE_DATES_CALCULATOR'
      maintenanceAlert:
        enabled: ${maintenance-alert-release-dates-feature-toggle:false}
        message: ${maintenance-alert-release-dates-message:placeholder}
    documents:
      text: 'Documents'
      ui-url: ${hmpps-court-cases-and-release-dates-ui-url}
      url-mapping: '/prisoner/{prisonerId}/documents'
      requiredRoles:
        - 'CCRD_DOCUMENTS'
      maintenanceAlert:
        enabled: ${maintenance-alert-document-feature-toggle:false}
        message: ${maintenance-alert-document-message:placeholder}
  maintenanceAlert:
    enabled: ${maintenance-alert-all-feature-toggle:false}
    message: ${maintenance-alert-all-message:placeholder}


feature-toggles:
  things-to-do: ${things-to-do-feature-toggle:false}

things-to-do-caching:
  enabled:  ${things-to-do-caching-toggle:false}